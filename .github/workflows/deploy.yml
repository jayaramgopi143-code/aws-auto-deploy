name: AWS Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t jayaramgopi143/aws-auto-deploy:v1 .

    - name: Push Docker Image
      run: docker push jayaramgopi143/aws-auto-deploy:v1

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop aws-auto-app || true
          docker rm aws-auto-app || true
          docker pull jayaramgopi143/aws-auto-deploy:v1
          docker run -d -p 8082:80 --name aws-auto-app jayaramgopi143/aws-auto-deploy:v1
